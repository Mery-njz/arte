<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☽｡! art .’ 3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="Chiikawa.png">
</head>
<body>

    <div class="diario-container">
        <div id="caderno" class="caderno">
            
            <div class="pagina capa-frontal" style="z-index: 10;">
                <div class="face frente capa-imagem">
                    <img src="capa.jpg" alt="Capa do diário" class="capa-foto">
                </div>
                <div class="face verso contra-capa"></div>
            </div>

           <div class="pagina" style="z-index: 9;">
    
    <div class="face verso folha-scrapbook">
        
        <div class="scrap-item polaroid foto-polaroid">
            <img src="su.jpg" alt="Foto Polaroid">
            <p class="legenda-polaroid">In love 💖</p>
        </div>

        <img src="asa.jpg" class="scrap-item foto-recortada" alt="Foto Recortada">

        <img src="sticker-borboleta.png" class="scrap-item sticker-borboleta" alt="Borboleta">
        <img src="fita-adesiva.png" class="scrap-item fita-tape" alt="Fita">
        
    </div>
    
    <div class="face frente folha-pautada">
        <span class="data">Data: 15/06/2026</span>
        <textarea readonly placeholder="Querido diário, hoje o dia foi...">Hoje decidi criar um scrapbook digital! Ficou muito fofo.</textarea>
    </div>

</div>
            <div class="pagina" style="z-index: 8;">
                <div class="face frente folha-pautada">
                    <span class="data">Data: 16/06/2026</span>
                    <textarea readonly placeholder="Escreva mais aqui...">Mais um dia de artes e códigos por aqui.</textarea>
                </div>
                <div class="face verso folha-pautada">
                    <span class="data">Data: 16/06/2026</span>
                    <textarea readonly placeholder="Mais pensamentos...">Fim das anotações dessa semana!</textarea>
                </div>
            </div>

            <div class="pagina capa-traseira" style="z-index: 7;">
                <div class="face frente contra-capa"></div>
                <div class="face verso capa-imagem"></div>
            </div>
        </div>
    </div>

    <script src="arte.js"></script>
</body>
</html>
