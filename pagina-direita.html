<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Café Aconchegante</title>
  <link rel="stylesheet" href="cafe.css">
</head>
<body>
  <div id="background"></div>

  <!-- Tela inicial -->
  <div id="start-screen">
    <h1>☕ Bem-vindo ao Café Aconchegante ☕</h1>
    <p>Sente-se, relaxe e escolha sua experiência...</p>
    <button id="start-btn">Entrar</button>
  </div>

  <!-- Container do jogo -->
  <div class="game-container hidden" id="game-container">
    <h2 id="question"></h2>
    <div id="answers"></div>
  </div>

  <!-- Tela final -->
  <div id="end" class="hidden">
    <h2 id="ending-text"></h2>
    <button onclick="restartGame()">Recomeçar</button>
    <a href="index.html" class="back">Voltar ao início</a>
  </div>

  <script src="cafe.js"></script>
</body>
</html>
